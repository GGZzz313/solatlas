name: api-check
on:
  push:
    branches: [claude/asteroid-visualization-solar-system-xxmqik]
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Probe JPL SSD APIs (status + CORS headers + body head)
        run: |
          probe() {
            echo "================================================================"
            echo "URL: $1"
            curl -sS -D /tmp/hdrs -o /tmp/body --max-time 60 -H "Origin: https://raw.githack.com" "$1" || echo "CURL-FAILED"
            echo "--- response headers:"
            cat /tmp/hdrs
            echo "--- body (first 500 bytes):"
            head -c 500 /tmp/body
            echo
          }
          F="pdes,name,a,e,i,om,w,ma,epoch,H,class,diameter"
          probe "https://ssd-api.jpl.nasa.gov/sbdb_query.api?fields=$F&sb-kind=a&sb-group=neo&limit=3"
          probe "https://ssd-api.jpl.nasa.gov/sbdb_query.api?fields=$F&sb-kind=a&limit=3"
          probe "https://ssd-api.jpl.nasa.gov/sbdb_query.api?fields=$F&sb-kind=a&sb-class=TJN&limit=3"
          probe "https://ssd-api.jpl.nasa.gov/sbdb_query.api?fields=$F&sb-kind=a&sb-class=TNO&limit=3"
          probe "https://ssd-api.jpl.nasa.gov/cad.api?dist-max=10LD&date-min=now&date-max=%2B60&sort=date"
