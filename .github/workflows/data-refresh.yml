name: data-refresh

# The JPL SSD APIs don't send CORS headers, so browsers can't query them
# directly. This workflow runs scripts/build-data.mjs server-side and commits
# the JSON snapshot the app serves from its own origin.
on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1" # weekly, Monday 05:17 UTC
  push:
    paths: [".github/workflows/data-refresh.yml", "scripts/build-data.mjs"]

permissions:
  contents: write

concurrency:
  group: data-refresh-${{ github.ref }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build snapshot from NASA/JPL APIs
        run: node scripts/build-data.mjs

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/asteroids.json
          if git diff --cached --quiet; then
            echo "Snapshot unchanged"
            exit 0
          fi
          git commit -m "Refresh NASA/JPL asteroid data snapshot"
          git push
